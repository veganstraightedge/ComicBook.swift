name: CI

on:
  push:
    branches: [main]

  pull_request:

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Install archive tools (unar, p7zip)
        run: brew install unar p7zip

      - name: Cache Swift dependencies
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('**/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build package
        run: swift build --configuration release

      - name: Run tests on macOS
        run: swift test --parallel

  lint:
    name: Code Formatting
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check code formatting
        run: swift format lint --recursive Sources Tests

  package-validation:
    name: Package Validation
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Describe package structure
        run: swift package describe --type json

      - name: Test debug build
        run: swift build --configuration debug

      - name: Test release build
        run: swift build --configuration release

      - name: Validate package exports
        run: |
          echo "Validating package structure..."
          swift build --target ComicBook --configuration release
          grep -r "public enum ComicBook" Sources/ && echo "✅ ComicBook namespace exported"
          grep -r "public struct Comic" Sources/ && echo "✅ Comic type exported"
          grep -r "public struct Page" Sources/ && echo "✅ Page type exported"
          echo "✅ Package validation completed successfully"
